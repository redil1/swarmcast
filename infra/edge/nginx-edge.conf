proxy_cache_path /dev/shm/edgecache levels=1:2 keys_zone=seg:200m inactive=90s max_size=8g use_temp_path=off;

log_format swarmcast_edge escape=json
    '{"ts":"$time_iso8601",'
    '"host":"$host",'
    '"uri":"$uri",'
    '"status":$status,'
    '"bytes":$body_bytes_sent,'
    '"cache":"$upstream_cache_status",'
    '"request_time":$request_time,'
    '"upstream_response_time":"$upstream_response_time",'
    '"upstream_status":"$upstream_status"}';

access_log /var/log/nginx/edge-access.log swarmcast_edge;

server {
    listen 80;
    server_name edge.example.tv;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type text/plain;
        try_files $uri =404;
    }

    location / {
        return 308 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name edge.example.tv;

    ssl_certificate     /etc/letsencrypt/live/edge.example.tv/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/edge.example.tv/privkey.pem;

    location = /_auth {
        internal;
        proxy_pass https://auth.example.tv/verify;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header X-Original-URI $request_uri;
        proxy_set_header X-Auth-Token $arg_token;
    }

    # Single-ingest-node path. The tracker emits this before the multi-node
    # control plane is enabled.
    location ~ ^/live/(?<rest>.+)$ {
        auth_request /_auth;
        proxy_pass https://origin.example.tv/live/$rest$is_args$args;
        proxy_cache seg;
        proxy_cache_key "$scheme$proxy_host$uri";
        proxy_cache_valid 200 60s;
        proxy_cache_valid 404 1s;
        proxy_cache_lock on;
        proxy_cache_use_stale updating error timeout;
        add_header X-Cache $upstream_cache_status;
        add_header Cache-Control "public, max-age=30";
    }

    location ~ ^/edge/(?<node>[a-z0-9-]+)/live/(?<rest>.+)$ {
        auth_request /_auth;
        proxy_pass https://$node.origin.example.tv/live/$rest$is_args$args;
        proxy_cache seg;
        proxy_cache_key "$scheme$proxy_host$uri";
        proxy_cache_valid 200 60s;
        proxy_cache_valid 404 1s;
        proxy_cache_lock on;
        proxy_cache_use_stale updating error timeout;
        add_header X-Cache $upstream_cache_status;
        add_header Cache-Control "public, max-age=30";
    }
}
