services:
  nginx-edge:
    build:
      context: ../..
      dockerfile: infra/edge/Dockerfile.nginx
    image: ${SWARMCAST_EDGE_NGINX_IMAGE:-swarmcast-edge-nginx:local}
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/www/certbot:/var/www/certbot:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - edge_logs:/var/log/nginx
    tmpfs:
      - /dev/shm/edgecache:size=8g

  edge-metrics:
    build:
      context: ../..
      dockerfile: infra/edge/Dockerfile.metrics
    image: ${SWARMCAST_EDGE_METRICS_IMAGE:-swarmcast-edge-metrics:local}
    restart: unless-stopped
    init: true
    stop_grace_period: 15s
    read_only: true
    tmpfs:
      - /tmp:size=16m,mode=1777
    cap_drop: ["ALL"]
    security_opt: ["no-new-privileges:true"]
    working_dir: /app
    environment:
      EDGE_ACCESS_LOG: /var/log/nginx/edge-access.log
      EDGE_METRICS_PORT: "9101"
    ports:
      - "9101:9101"
    volumes:
      - edge_logs:/var/log/nginx:ro
    healthcheck:
      test: ["CMD", "/nodejs/bin/node", "-e", "fetch('http://127.0.0.1:9101/ready').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s

  node_exporter:
    image: ${SWARMCAST_NODE_EXPORTER_IMAGE:-prom/node-exporter:v1.12.0-distroless}
    restart: unless-stopped
    ports:
      - "9100:9100"

volumes:
  edge_logs:
