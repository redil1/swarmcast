services:
  nginx-edge:
    image: ${SWARMCAST_EDGE_NGINX_IMAGE:-nginx:1.27}
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx-edge.conf:/etc/nginx/conf.d/edge.conf:ro
      - /var/www/certbot:/var/www/certbot:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - edge_logs:/var/log/nginx
    tmpfs:
      - /dev/shm/edgecache:size=8g

  edge-metrics:
    image: ${SWARMCAST_EDGE_METRICS_IMAGE:-node:22-slim}
    restart: unless-stopped
    working_dir: /app
    command: ["node", "scripts/edge-cache-metrics-server.js"]
    environment:
      EDGE_ACCESS_LOG: /var/log/nginx/edge-access.log
      EDGE_METRICS_PORT: "9101"
    ports:
      - "9101:9101"
    volumes:
      - ../../package.json:/app/package.json:ro
      - ../../scripts:/app/scripts:ro
      - edge_logs:/var/log/nginx:ro

  node_exporter:
    image: ${SWARMCAST_NODE_EXPORTER_IMAGE:-prom/node-exporter:v1.8.0}
    restart: unless-stopped
    ports:
      - "9100:9100"

volumes:
  edge_logs:
