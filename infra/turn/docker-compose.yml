services:
  turn:
    image: ${SWARMCAST_TURN_IMAGE:-swarmcast-turn:local}
    restart: unless-stopped
    network_mode: host
    environment:
      TURN_REALM: ${TURN_REALM}
      TURN_EXTERNAL_IP: ${TURN_EXTERNAL_IP}
      TURN_LISTENING_IP: ${TURN_LISTENING_IP:-}
      TURN_RELAY_IP: ${TURN_RELAY_IP:-}
      TURN_SHARED_SECRET: ${TURN_SHARED_SECRET}
      TURN_PREVIOUS_SHARED_SECRET: ${TURN_PREVIOUS_SHARED_SECRET:-}
      TURN_LISTENING_PORT: ${TURN_LISTENING_PORT:-3478}
      TURN_TLS_LISTENING_PORT: ${TURN_TLS_LISTENING_PORT:-5349}
      TURN_MIN_PORT: ${TURN_MIN_PORT:-49152}
      TURN_MAX_PORT: ${TURN_MAX_PORT:-65535}
      TURN_USER_QUOTA: ${TURN_USER_QUOTA:-12}
      TURN_TOTAL_QUOTA: ${TURN_TOTAL_QUOTA:-10000}
      TURN_MAX_BPS: ${TURN_MAX_BPS:-1250000}
      TURN_BPS_CAPACITY: ${TURN_BPS_CAPACITY:-100000000}
      TURN_PROMETHEUS_PORT: ${TURN_PROMETHEUS_PORT:-9641}
      TURN_PROMETHEUS_ADDRESS: ${TURN_PROMETHEUS_ADDRESS:-0.0.0.0}
    entrypoint: ["/bin/sh", "/etc/swarmcast/render-config.sh"]
    volumes:
      - ./render-config.sh:/etc/swarmcast/render-config.sh:ro
      - ${TURN_CERT_DIR}:/certs:ro
    read_only: true
    tmpfs:
      - /run:size=1m,mode=0700,uid=65534,gid=65534
      - /tmp:size=16m,mode=1777
    cap_drop: ["ALL"]
    cap_add: ["NET_BIND_SERVICE"]
    healthcheck:
      test: ["CMD-SHELL", "turnutils_stunclient -p $${TURN_LISTENING_PORT} 127.0.0.1 >/dev/null 2>&1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
