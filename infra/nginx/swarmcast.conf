limit_req_zone $binary_remote_addr zone=seg:50m rate=10r/s;
limit_conn_zone $binary_remote_addr zone=segconn:50m;

upstream tracker_ws {
    server tracker:7000;
    keepalive 64;
}

upstream auth_svc {
    server auth:7003;
    keepalive 16;
}

upstream control_plane {
    server control-plane:7010;
    keepalive 16;
}

upstream web_svc {
    server web:7030;
    keepalive 16;
}

server {
    listen 80;
    server_name origin.example.tv api.example.tv tracker.example.tv watch.example.tv;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type text/plain;
        try_files $uri =404;
    }

    location / {
        return 308 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name watch.example.tv;

    ssl_certificate     /etc/letsencrypt/live/watch.example.tv/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/watch.example.tv/privkey.pem;

    add_header Content-Security-Policy "default-src 'self'; connect-src 'self' https://origin.example.tv wss://tracker.example.tv; img-src 'self' data: https:; media-src 'self' blob: https://origin.example.tv; worker-src 'self' blob:; style-src 'self'; script-src 'self'; object-src 'none'; base-uri 'self'; frame-ancestors 'none'" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;

    location / {
        proxy_pass http://web_svc;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name origin.example.tv;

    ssl_certificate     /etc/letsencrypt/live/origin.example.tv/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/origin.example.tv/privkey.pem;

    location = /_auth {
        internal;
        proxy_pass http://auth_svc/verify;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header X-Original-URI $request_uri;
        proxy_set_header X-Auth-Token $arg_token;
    }

    location ~ ^/live/(.*\.m3u8)$ {
        auth_request /_auth;
        root /var/hls_alias;
        rewrite ^/live/(.*)$ /$1 break;
        add_header Cache-Control "no-cache";
        add_header Access-Control-Allow-Origin "*";
    }

    location ~ ^/live/(.*\.(m4s|mp4))$ {
        auth_request /_auth;
        root /var/hls_alias;
        rewrite ^/live/(.*)$ /$1 break;
        limit_req zone=seg burst=30 nodelay;
        limit_conn segconn 20;
        add_header Cache-Control "public, max-age=300, immutable";
        add_header Access-Control-Allow-Origin "*";
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name api.example.tv;

    ssl_certificate     /etc/letsencrypt/live/api.example.tv/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.example.tv/privkey.pem;

    location = /token {
        proxy_pass http://auth_svc/token;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /channels {
        proxy_pass http://control_plane;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /groups {
        proxy_pass http://control_plane;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name tracker.example.tv;

    ssl_certificate     /etc/letsencrypt/live/tracker.example.tv/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tracker.example.tv/privkey.pem;

    location /ws {
        proxy_pass http://tracker_ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }
}
