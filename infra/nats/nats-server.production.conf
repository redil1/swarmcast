server_name: $NATS_SERVER_NAME
listen: 0.0.0.0:4222
http: 127.0.0.1:8222

jetstream {
  store_dir: "/data/jetstream"
  max_mem_store: $NATS_MAX_MEMORY_STORE
  max_file_store: $NATS_MAX_FILE_STORE
}

tls {
  cert_file: "/run/secrets/nats/server.crt"
  key_file: "/run/secrets/nats/server.key"
  verify: false
  timeout: 2
}

cluster {
  name: "swarmcast-segment-bus"
  listen: 0.0.0.0:6222
  routes: $NATS_CLUSTER_ROUTES
  tls {
    cert_file: "/run/secrets/nats/server.crt"
    key_file: "/run/secrets/nats/server.key"
    ca_file: "/run/secrets/nats/ca.crt"
    verify: true
    timeout: 2
  }
}

authorization {
  users: [
    {
      user: $NATS_ADMIN_USER
      password: $NATS_ADMIN_PASSWORD
      permissions: {
        publish: ["$JS.API.INFO", "$JS.API.>"]
        subscribe: ["_INBOX.>"]
      }
    },
    {
      user: $NATS_INGEST_USER
      password: $NATS_INGEST_PASSWORD
      permissions: {
        publish: ["swarmcast.segment.>"]
        subscribe: ["_INBOX.>"]
      }
    },
    {
      user: $NATS_TRACKER_USER
      password: $NATS_TRACKER_PASSWORD
      permissions: {
        publish: [
          "$JS.API.INFO",
          "$JS.API.STREAM.INFO.SWARMCAST_SEGMENTS",
          "$JS.API.STREAM.MSG.GET.SWARMCAST_SEGMENTS"
        ]
        subscribe: ["swarmcast.segment.>", "_INBOX.>"]
      }
    }
  ]
}
