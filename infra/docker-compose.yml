services:
  segment-bus:
    image: ${SWARMCAST_NATS_IMAGE:-nats:2.12.1-alpine@sha256:b3f2bd84176ae7bd0afa9c48a00f06d7d0818ff4aaee898e4172e0b8340e5816}
    restart: unless-stopped
    init: true
    stop_grace_period: 30s
    read_only: true
    tmpfs:
      - /tmp:size=16m,mode=1777
    cap_drop: ["ALL"]
    security_opt: ["no-new-privileges:true"]
    command: ["-c", "/etc/nats/nats-server.conf"]
    environment:
      NATS_INGEST_USER: ${NATS_INGEST_USER:-ingest}
      NATS_INGEST_PASSWORD: ${NATS_INGEST_PASSWORD:-local-ingest-segment-bus-password-0001}
      NATS_TRACKER_USER: ${NATS_TRACKER_USER:-tracker}
      NATS_TRACKER_PASSWORD: ${NATS_TRACKER_PASSWORD:-local-tracker-segment-bus-password-0001}
    volumes:
      - ./nats/nats-server.conf:/etc/nats/nats-server.conf:ro
      - segment-bus-data:/data
    networks: [internal]
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:8222/healthz?js-enabled-only=true"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  segment-bus-exporter:
    image: ${SWARMCAST_NATS_EXPORTER_IMAGE:-natsio/prometheus-nats-exporter:0.17.3@sha256:26c826662ac8424597cc9bdf89ea5b606eb66e3c11db9b1215c27d2076bbb01b}
    restart: unless-stopped
    init: true
    read_only: true
    cap_drop: ["ALL"]
    security_opt: ["no-new-privileges:true"]
    depends_on:
      segment-bus:
        condition: service_healthy
    command: ["-varz", "-connz", "-healthz", "-healthz_js_enabled_only", "-jsz=all", "http://segment-bus:8222"]
    networks: [internal]

  ingest:
    build:
      context: ..
      dockerfile: services/ingest/Dockerfile
    restart: unless-stopped
    init: true
    stop_grace_period: 15s
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    cap_drop: ["ALL"]
    security_opt: ["no-new-privileges:true"]
    environment:
      M3U_PATH: ${M3U_PATH:-/config/source.m3u}
      HLS_ROOT: /var/hls
      MAX_CHANNELS: ${MAX_CHANNELS:-140}
      TRACKER_INTERNAL_URL: http://tracker:7002
      TRACKER_INTERNAL_URLS: ${TRACKER_INTERNAL_URLS:-[]}
      INTERNAL_TOKEN: ${INTERNAL_TOKEN}
      SOURCE_ALLOWED_HOSTS: ${SOURCE_ALLOWED_HOSTS:-}
      SOURCE_ALLOW_PRIVATE_NETWORKS: ${SOURCE_ALLOW_PRIVATE_NETWORKS:-0}
      TAIL_ADMISSION_MAX_CHANNELS: ${TAIL_ADMISSION_MAX_CHANNELS:-0}
      TAIL_DOWNSCALE_ENABLED: ${TAIL_DOWNSCALE_ENABLED:-0}
      TAIL_DOWNSCALE_VIDEO_KBPS: ${TAIL_DOWNSCALE_VIDEO_KBPS:-900}
      TAIL_DOWNSCALE_AUDIO_KBPS: ${TAIL_DOWNSCALE_AUDIO_KBPS:-64}
      SEGMENT_BUS_ENABLED: ${SEGMENT_BUS_ENABLED:-1}
      SEGMENT_BUS_SERVERS: ${SEGMENT_BUS_SERVERS:-["nats://segment-bus:4222"]}
      SEGMENT_BUS_USER: ${NATS_INGEST_USER:-ingest}
      SEGMENT_BUS_PASSWORD: ${NATS_INGEST_PASSWORD:-local-ingest-segment-bus-password-0001}
      SEGMENT_BUS_TLS_REQUIRED: ${SEGMENT_BUS_TLS_REQUIRED:-0}
      SEGMENT_BUS_TLS_CA_FILE: ${SEGMENT_BUS_TLS_CA_FILE:-}
      SEGMENT_BUS_MANAGE_STREAM: ${SEGMENT_BUS_MANAGE_STREAM:-1}
      SEGMENT_BUS_CONNECT_TIMEOUT_MS: ${SEGMENT_BUS_CONNECT_TIMEOUT_MS:-5000}
      SEGMENT_BUS_PUBLISH_TIMEOUT_MS: ${SEGMENT_BUS_PUBLISH_TIMEOUT_MS:-3000}
      SEGMENT_BUS_MAX_AGE_SECONDS: ${SEGMENT_BUS_MAX_AGE_SECONDS:-600}
      SEGMENT_BUS_MAX_MESSAGES_PER_SUBJECT: ${SEGMENT_BUS_MAX_MESSAGES_PER_SUBJECT:-120}
      SEGMENT_BUS_MAX_BYTES: ${SEGMENT_BUS_MAX_BYTES:-1073741824}
      SEGMENT_BUS_REPLICAS: ${SEGMENT_BUS_REPLICAS:-1}
    volumes:
      - /var/hls:/var/hls
      - ../config:/config:ro
    networks: [internal]
    healthcheck:
      test: ["CMD", "/usr/local/bin/node", "-e", "fetch('http://127.0.0.1:7001/ready').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 15s

  tracker:
    build:
      context: ..
      dockerfile: services/tracker/Dockerfile
    restart: unless-stopped
    init: true
    stop_grace_period: 15s
    read_only: true
    tmpfs:
      - /tmp:size=16m,mode=1777
    cap_drop: ["ALL"]
    security_opt: ["no-new-privileges:true"]
    depends_on:
      ingest:
        condition: service_healthy
      auth:
        condition: service_healthy
      control-plane:
        condition: service_healthy
    environment:
      INTERNAL_TOKEN: ${INTERNAL_TOKEN}
      INGEST_URL: http://ingest:7001
      CONTROL_PLANE_URL: http://control-plane:7010
      AUTH_JWKS_URL: http://auth:7003/jwks
      AUTH_JWT_AUDIENCE: ${AUTH_JWT_AUDIENCE:-swarmcast}
      AUTH_JWT_ISSUER: ${AUTH_JWT_ISSUER:-swarmcast-auth}
      ORIGIN_BASE: ${ORIGIN_BASE}
      EDGE_BASE: ${EDGE_BASE}
      P2P_MIN_SWARM_SIZE: ${P2P_MIN_SWARM_SIZE:-20}
      TRACKER_MAX_CONNECTIONS: ${TRACKER_MAX_CONNECTIONS:-100000}
      TRACKER_MAX_PAYLOAD_BYTES: ${TRACKER_MAX_PAYLOAD_BYTES:-16384}
      TRACKER_MAX_BACKPRESSURE_BYTES: ${TRACKER_MAX_BACKPRESSURE_BYTES:-262144}
      TRACKER_CELL_MAX_PEERS: ${TRACKER_CELL_MAX_PEERS:-20000}
      TRACKER_IDLE_TIMEOUT_SECONDS: ${TRACKER_IDLE_TIMEOUT_SECONDS:-120}
      TRACKER_DEMAND_HEARTBEAT_SECONDS: ${TRACKER_DEMAND_HEARTBEAT_SECONDS:-30}
      TRACKER_RATE_LIMIT_CAPACITY: ${TRACKER_RATE_LIMIT_CAPACITY:-50}
      TRACKER_RATE_LIMIT_REFILL_PER_SECOND: ${TRACKER_RATE_LIMIT_REFILL_PER_SECOND:-50}
      TRACKER_SHARD_ID: ${TRACKER_SHARD_ID:-}
      TRACKER_SHARDS: ${TRACKER_SHARDS:-[]}
      SEGMENT_BUS_ENABLED: ${SEGMENT_BUS_ENABLED:-1}
      SEGMENT_BUS_SERVERS: ${SEGMENT_BUS_SERVERS:-["nats://segment-bus:4222"]}
      SEGMENT_BUS_USER: ${NATS_TRACKER_USER:-tracker}
      SEGMENT_BUS_PASSWORD: ${NATS_TRACKER_PASSWORD:-local-tracker-segment-bus-password-0001}
      SEGMENT_BUS_TLS_REQUIRED: ${SEGMENT_BUS_TLS_REQUIRED:-0}
      SEGMENT_BUS_TLS_CA_FILE: ${SEGMENT_BUS_TLS_CA_FILE:-}
      SEGMENT_BUS_CONNECT_TIMEOUT_MS: ${SEGMENT_BUS_CONNECT_TIMEOUT_MS:-5000}
    ulimits:
      nofile:
        soft: 1048576
        hard: 1048576
    networks: [internal]
    healthcheck:
      test: ["CMD", "/nodejs/bin/node", "-e", "fetch('http://127.0.0.1:7002/ready').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 15s

  auth:
    build:
      context: ..
      dockerfile: services/auth/Dockerfile
    restart: unless-stopped
    init: true
    stop_grace_period: 15s
    read_only: true
    tmpfs:
      - /tmp:size=16m,mode=1777
    cap_drop: ["ALL"]
    security_opt: ["no-new-privileges:true"]
    environment:
      APP_API_KEY: ${APP_API_KEY}
      AUTH_KEY_PATH: ${AUTH_KEY_PATH:-/data/es256.pem}
      AUTH_KEY_ID: ${AUTH_KEY_ID:-swarmcast-1}
      AUTH_PREVIOUS_JWKS_PATH: ${AUTH_PREVIOUS_JWKS_PATH:-}
      AUTH_JWT_AUDIENCE: ${AUTH_JWT_AUDIENCE:-swarmcast}
      AUTH_JWT_ISSUER: ${AUTH_JWT_ISSUER:-swarmcast-auth}
      AUTH_TOKEN_TTL_SECONDS: ${AUTH_TOKEN_TTL_SECONDS:-21600}
      AUTH_PLAY_INTEGRITY_ENABLED: ${AUTH_PLAY_INTEGRITY_ENABLED:-0}
      AUTH_PLAY_INTEGRITY_PACKAGE_NAME: ${AUTH_PLAY_INTEGRITY_PACKAGE_NAME:-tv.swarmcast}
      AUTH_PLAY_INTEGRITY_SERVICE_ACCOUNT_PATH: ${AUTH_PLAY_INTEGRITY_SERVICE_ACCOUNT_PATH:-}
      AUTH_PLAY_INTEGRITY_CERTIFICATE_SHA256_DIGESTS: ${AUTH_PLAY_INTEGRITY_CERTIFICATE_SHA256_DIGESTS:-[]}
      AUTH_PLAY_INTEGRITY_MAX_TOKEN_AGE_SECONDS: ${AUTH_PLAY_INTEGRITY_MAX_TOKEN_AGE_SECONDS:-120}
      AUTH_ATTESTATION_CHALLENGE_SECRET: ${AUTH_ATTESTATION_CHALLENGE_SECRET:-}
      AUTH_ATTESTATION_PREVIOUS_CHALLENGE_SECRET: ${AUTH_ATTESTATION_PREVIOUS_CHALLENGE_SECRET:-}
      AUTH_ATTESTATION_CHALLENGE_TTL_SECONDS: ${AUTH_ATTESTATION_CHALLENGE_TTL_SECONDS:-120}
      ICE_SERVER_ALLOWED_HOSTS: ${ICE_SERVER_ALLOWED_HOSTS:-}
      ICE_STUN_URLS: ${ICE_STUN_URLS:-["stun:stun.l.google.com:19302","stun:stun.cloudflare.com:3478"]}
      TURN_ENABLED: ${TURN_ENABLED:-0}
      TURN_URLS: ${TURN_URLS:-[]}
      TURN_SHARED_SECRET: ${TURN_SHARED_SECRET:-}
      TURN_CREDENTIAL_TTL_SECONDS: ${TURN_CREDENTIAL_TTL_SECONDS:-3600}
    volumes:
      - auth-keys:/data
      - ${AUTH_PLAY_INTEGRITY_SERVICE_ACCOUNT_FILE:-./secrets/play-integrity-service-account.json}:${AUTH_PLAY_INTEGRITY_SERVICE_ACCOUNT_PATH:-/run/secrets/play-integrity-service-account.json}:ro
    networks: [internal]
    healthcheck:
      test: ["CMD", "/nodejs/bin/node", "-e", "fetch('http://127.0.0.1:7003/ready').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 15s

  control-plane:
    build:
      context: ..
      dockerfile: services/control-plane/Dockerfile
    restart: unless-stopped
    init: true
    stop_grace_period: 15s
    read_only: true
    tmpfs:
      - /tmp:size=16m,mode=1777
    cap_drop: ["ALL"]
    security_opt: ["no-new-privileges:true"]
    environment:
      M3U_PATH: ${M3U_PATH:-/config/source.m3u}
      CATALOG_DB_PATH: ${CATALOG_DB_PATH:-/data/catalog.sqlite}
      CATALOG_SNAPSHOT_PATH: ${CATALOG_SNAPSHOT_PATH:-/data/catalog-snapshot.json}
      CONTROL_PLANE_PORT: 7010
      INTERNAL_TOKEN: ${INTERNAL_TOKEN}
      INGEST_NODES: ${INGEST_NODES:-[{"id":"origin","baseUrl":"https://origin.example.tv","ingestUrl":"http://ingest:7001"}]}
      PLACEMENT_DB_PATH: ${PLACEMENT_DB_PATH:-/data/placements.sqlite}
      PLACEMENT_PATH: ${PLACEMENT_PATH:-/data/placements.json}
      SOURCE_ALLOWED_HOSTS: ${SOURCE_ALLOWED_HOSTS:-}
      SOURCE_ALLOW_PRIVATE_NETWORKS: ${SOURCE_ALLOW_PRIVATE_NETWORKS:-0}
    volumes:
      - ../config:/config:ro
      - control-plane-data:/data
    networks: [internal]
    healthcheck:
      test: ["CMD", "/nodejs/bin/node", "-e", "fetch('http://127.0.0.1:7010/ready').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 15s

  retention-worker:
    build:
      context: ..
      dockerfile: services/retention-worker/Dockerfile
    restart: unless-stopped
    init: true
    stop_grace_period: 15s
    read_only: true
    tmpfs:
      - /tmp:size=16m,mode=1777
    cap_drop: ["ALL"]
    security_opt: ["no-new-privileges:true"]
    environment:
      RETENTION_WORKER_PORT: 7020
      RETENTION_POLICY_FILE: /config/data-retention.json
      RETENTION_INTERVAL_MS: ${RETENTION_INTERVAL_MS:-86400000}
      RETENTION_RUN_ON_START: ${RETENTION_RUN_ON_START:-1}
      RETENTION_EXECUTE: ${RETENTION_EXECUTE:-0}
      RETENTION_STORE_MODULE: ${RETENTION_STORE_MODULE:-}
      RETENTION_STORE_HTTP_BASE_URL: ${RETENTION_STORE_HTTP_BASE_URL:-}
      RETENTION_STORE_HTTP_TOKEN: ${RETENTION_STORE_HTTP_TOKEN:-}
      RETENTION_STORE_HTTP_TIMEOUT_MS: ${RETENTION_STORE_HTTP_TIMEOUT_MS:-10000}
      RETENTION_RECORDS_FILE: ${RETENTION_RECORDS_FILE:-/data/retention-records.jsonl}
      RETENTION_ACTION_LOG: /data/retention-actions.jsonl
    volumes:
      - ../config:/config:ro
      - retention-worker-data:/data
    networks: [internal]
    healthcheck:
      test: ["CMD", "/nodejs/bin/node", "-e", "fetch('http://127.0.0.1:7020/ready').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 15s

  nginx:
    build:
      context: ..
      dockerfile: infra/nginx/Dockerfile
    image: ${SWARMCAST_NGINX_IMAGE:-swarmcast-nginx:local}
    restart: unless-stopped
    stop_grace_period: 15s
    depends_on:
      ingest:
        condition: service_healthy
      auth:
        condition: service_healthy
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - /var/hls:/var/hls_alias:ro
      - /var/www/certbot:/var/www/certbot:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    networks: [internal]

  prometheus:
    image: ${SWARMCAST_PROMETHEUS_IMAGE:-prom/prometheus:v3.13.1-distroless}
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alerts.yml:/etc/prometheus/alerts.yml:ro
      - ${TURN_TARGETS_DIR:-./monitoring/turn-targets}:/etc/prometheus/turn-targets:ro
      - prom-data:/prometheus
    networks: [internal]

  alertmanager:
    build:
      context: ..
      dockerfile: infra/monitoring/Dockerfile.alertmanager
    image: ${SWARMCAST_ALERTMANAGER_IMAGE:-swarmcast-alertmanager:local}
    restart: unless-stopped
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
    volumes:
      - ${ALERTMANAGER_CONFIG_PATH:-./monitoring/alertmanager.yml}:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager-data:/alertmanager
    networks: [internal]

  grafana:
    build:
      context: ..
      dockerfile: infra/monitoring/Dockerfile.grafana
    image: ${SWARMCAST_GRAFANA_IMAGE:-swarmcast-grafana:local}
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
    networks: [internal]

networks:
  internal: {}

volumes:
  segment-bus-data: {}
  auth-keys: {}
  prom-data: {}
  alertmanager-data: {}
  grafana-data: {}
  control-plane-data: {}
  retention-worker-data: {}
