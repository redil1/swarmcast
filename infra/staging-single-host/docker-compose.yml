services:
  source-volume-init:
    image: caddy@sha256:fce4f15aad23222c0ac78a1220adf63bae7b94355d5ea28eee53910624acedfa
    user: "0:0"
    command: ["sh", "-c", "chown 1000:1000 /source"]
    volumes:
      - staging-source:/source
    networks: [internal]

  source-generator:
    image: infra-ingest
    restart: unless-stopped
    init: true
    stop_grace_period: 15s
    read_only: true
    tmpfs:
      - /tmp:size=32m,mode=1777
    cap_drop: ["ALL"]
    security_opt: ["no-new-privileges:true"]
    command:
      - ffmpeg
      - -hide_banner
      - -loglevel
      - warning
      - -re
      - -stream_loop
      - "-1"
      - -i
      - /fixture/playlist.m3u8
      - -map
      - 0:v:0
      - -map
      - 0:a:0?
      - -c
      - copy
      - -f
      - hls
      - -hls_time
      - "2"
      - -hls_list_size
      - "12"
      - -hls_flags
      - delete_segments+independent_segments+program_date_time
      - -hls_segment_type
      - fmp4
      - -hls_fmp4_init_filename
      - init.mp4
      - -hls_segment_filename
      - /source/seg_%08d.m4s
      - /source/playlist.m3u8
    volumes:
      - ../test-fixtures/media/fmp4:/fixture:ro
      - staging-source:/source
    networks: [internal]
    depends_on:
      source-volume-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "test", "-s", "/source/playlist.m3u8"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 5s

  gateway:
    image: caddy@sha256:fce4f15aad23222c0ac78a1220adf63bae7b94355d5ea28eee53910624acedfa
    restart: unless-stopped
    init: true
    stop_grace_period: 15s
    environment:
      SWARMCAST_PUBLIC_SUFFIX: ${SWARMCAST_PUBLIC_SUFFIX:?set SWARMCAST_PUBLIC_SUFFIX}
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./staging-single-host/Caddyfile:/etc/caddy/Caddyfile:ro
      - staging-source:/source:ro
      - /var/hls:/var/hls:ro
      - staging-caddy-data:/data
      - staging-caddy-config:/config
    networks: [internal]
    depends_on:
      source-generator:
        condition: service_healthy
      auth:
        condition: service_healthy
      control-plane:
        condition: service_healthy
      ingest:
        condition: service_healthy
      tracker:
        condition: service_healthy
      web:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "caddy", "validate", "--config", "/etc/caddy/Caddyfile"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  turn-cert-init:
    image: caddy@sha256:fce4f15aad23222c0ac78a1220adf63bae7b94355d5ea28eee53910624acedfa
    user: "0:0"
    environment:
      SWARMCAST_PUBLIC_SUFFIX: ${SWARMCAST_PUBLIC_SUFFIX:?set SWARMCAST_PUBLIC_SUFFIX}
    command:
      - sh
      - -eu
      - -c
      - |
        realm="origin.$${SWARMCAST_PUBLIC_SUFFIX}"
        attempt=0
        while [ "$$attempt" -lt 60 ]; do
          cert=$$(find /caddy-data/caddy/certificates -type f -path "*/$$realm/$$realm.crt" 2>/dev/null | head -n 1)
          key=$$(find /caddy-data/caddy/certificates -type f -path "*/$$realm/$$realm.key" 2>/dev/null | head -n 1)
          if [ -s "$$cert" ] && [ -s "$$key" ]; then
            cp "$$cert" /certs/fullchain.pem
            cp "$$key" /certs/privkey.pem
            chown 65534:65534 /certs/fullchain.pem /certs/privkey.pem
            chmod 0600 /certs/fullchain.pem /certs/privkey.pem
            exit 0
          fi
          attempt=$$((attempt + 1))
          sleep 2
        done
        echo "timed out waiting for the Caddy-managed TURN certificate" >&2
        exit 1
    volumes:
      - staging-caddy-data:/caddy-data:ro
      - staging-turn-certs:/certs
    depends_on:
      gateway:
        condition: service_healthy

  turn:
    build:
      context: ..
      dockerfile: infra/turn/Dockerfile
    image: ${SWARMCAST_TURN_IMAGE:-swarmcast-turn:local}
    restart: unless-stopped
    network_mode: host
    environment:
      TURN_REALM: ${TURN_REALM:?set TURN_REALM}
      TURN_EXTERNAL_IP: ${TURN_EXTERNAL_IP:?set TURN_EXTERNAL_IP}
      TURN_LISTENING_IP: ${TURN_LISTENING_IP:?set TURN_LISTENING_IP}
      TURN_RELAY_IP: ${TURN_RELAY_IP:?set TURN_RELAY_IP}
      TURN_SHARED_SECRET: ${TURN_SHARED_SECRET:?set TURN_SHARED_SECRET}
      TURN_LISTENING_PORT: ${TURN_LISTENING_PORT:-3478}
      TURN_TLS_LISTENING_PORT: ${TURN_TLS_LISTENING_PORT:-5349}
      TURN_MIN_PORT: ${TURN_MIN_PORT:-55000}
      TURN_MAX_PORT: ${TURN_MAX_PORT:-55999}
      TURN_USER_QUOTA: ${TURN_USER_QUOTA:-12}
      TURN_TOTAL_QUOTA: ${TURN_TOTAL_QUOTA:-1000}
      TURN_MAX_BPS: ${TURN_MAX_BPS:-1250000}
      TURN_BPS_CAPACITY: ${TURN_BPS_CAPACITY:-100000000}
      TURN_PROMETHEUS_PORT: ${TURN_PROMETHEUS_PORT:-9641}
      TURN_PROMETHEUS_ADDRESS: ${TURN_PROMETHEUS_ADDRESS:-127.0.0.1}
      TURN_ALLOW_PRIVATE_PEERS: ${TURN_ALLOW_PRIVATE_PEERS:-0}
    entrypoint: ["/bin/sh", "/etc/swarmcast/render-config.sh"]
    volumes:
      - ./turn/render-config.sh:/etc/swarmcast/render-config.sh:ro
      - staging-turn-certs:/certs:ro
    read_only: true
    tmpfs:
      - /run:size=1m,mode=0700,uid=65534,gid=65534
      - /tmp:size=16m,mode=1777
    cap_drop: ["ALL"]
    cap_add: ["NET_BIND_SERVICE"]
    depends_on:
      turn-cert-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "turnutils_stunclient -p $${TURN_LISTENING_PORT} $${TURN_LISTENING_IP} >/dev/null 2>&1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  ingest:
    environment:
      M3U_PATH: /app/services/ingest/source.m3u
    volumes:
      - ${STAGING_M3U_FILE:-./staging-single-host/source.m3u}:/app/services/ingest/source.m3u:ro

  control-plane:
    environment:
      M3U_PATH: /app/services/control-plane/source.m3u
    volumes:
      - ${STAGING_M3U_FILE:-./staging-single-host/source.m3u}:/app/services/control-plane/source.m3u:ro

volumes:
  staging-source: {}
  staging-caddy-data: {}
  staging-caddy-config: {}
  staging-turn-certs: {}
