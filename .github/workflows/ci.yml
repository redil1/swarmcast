name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  node:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: npm
      - run: npm ci --ignore-scripts
      - run: npm run verify
      - run: npm run smoke:tracker-ws-cells
      - run: npm run smoke:tracker-ws-cells-1k
      - run: npm run smoke:webrtc-hash-rejection
      - run: npm run smoke:webrtc-200
      - run: npm audit --audit-level=moderate

  android:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          distribution: temurin
          java-version: 17
      - uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699 # v4.0.1
        with:
          packages: "platforms;android-35 build-tools;35.0.0"
      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
      - run: ./gradlew --no-daemon testDebugUnitTest assembleDebug assembleRelease
        working-directory: android
      - name: Compute Android APK checksums
        run: |
          (cd android/app/build/outputs/apk/debug && sha256sum app-debug.apk > app-debug.apk.sha256)
          (cd android/app/build/outputs/apk/release && sha256sum app-release-unsigned.apk > app-release-unsigned.apk.sha256)
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: swarmcast-android-debug-apk
          path: |
            android/app/build/outputs/apk/debug/app-debug.apk
            android/app/build/outputs/apk/debug/app-debug.apk.sha256
          if-no-files-found: error
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: swarmcast-android-release-unsigned-apk
          path: |
            android/app/build/outputs/apk/release/app-release-unsigned.apk
            android/app/build/outputs/apk/release/app-release-unsigned.apk.sha256
          if-no-files-found: error

  deployment-shape:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: npm
      - run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - run: npm ci --ignore-scripts
      - run: docker compose -f infra/docker-compose.yml config
      - run: docker compose -f infra/edge/docker-compose.yml config
      - run: docker compose --env-file test-fixtures/config/production.env -f infra/turn/docker-compose.yml config
      - run: docker compose -f infra/docker-compose.yml build auth control-plane ingest retention-worker tracker
      - run: docker compose -f infra/edge/docker-compose.yml build edge-metrics
      - run: npm run smoke:service-lifecycle-containers
      - run: npm run smoke:segment-bus
      - run: npm run smoke:segment-bus-cluster
      - run: docker pull nginx:1.29.8-alpine3.23-slim@sha256:c9366b8c560169b101ca0e5422ed063b20779e6454c2326b9c9704225c9b0c08
      - run: npm run smoke:nginx-config
      - run: npm run smoke:nginx-origin-playback
      - run: npm run smoke:nginx-edge-cache
      - run: npm run smoke:turn
      - run: npm run smoke:webrtc-turn-auth-rejection
      - run: npm run smoke:webrtc-turn-relay
      - run: npm run smoke:webrtc-turn-relay-20
