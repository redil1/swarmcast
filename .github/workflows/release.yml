name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Immutable release version, for example v0.1.0-rc1
        required: true
        type: string
      environment:
        description: Deployment environment
        required: true
        default: staging
        type: choice
        options:
          - staging
          - production
      push_images:
        description: Push images to GHCR
        required: true
        default: true
        type: boolean

permissions:
  contents: read
  packages: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: npm
      - run: npm ci --ignore-scripts
      - run: npm run verify
      - name: Generate release manifest
        run: |
          mkdir -p var/release
          npm run release:manifest -- \
            --version "${{ inputs.version }}" \
            --environment "${{ inputs.environment }}" \
            --commit "${{ github.sha }}" \
            --repository "${{ github.repository }}" \
            --output var/release/swarmcast-release-manifest.json
          npm run release:manifest -- --input var/release/swarmcast-release-manifest.json --check
      - name: Generate SBOM
        run: |
          mkdir -p var/sbom
          npm run sbom:generate -- --output var/sbom/swarmcast-sbom.json
          npm run sbom:generate -- --check
      - name: Upload release manifest
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: swarmcast-release-manifest
          path: var/release/swarmcast-release-manifest.json
      - name: Upload SBOM
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: swarmcast-sbom
          path: var/sbom/swarmcast-sbom.json

  images:
    needs: verify
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [auth, ingest, tracker, control-plane, retention-worker]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Log in to GHCR
        if: ${{ inputs.push_images }}
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build image
        run: |
          IMAGE="ghcr.io/${{ github.repository }}/${{ matrix.service }}"
          docker build \
            -f "services/${{ matrix.service }}/Dockerfile" \
            -t "${IMAGE}:${{ inputs.version }}" \
            -t "${IMAGE}:${{ github.sha }}" \
            .
      - name: Push immutable tags
        if: ${{ inputs.push_images }}
        run: |
          IMAGE="ghcr.io/${{ github.repository }}/${{ matrix.service }}"
          docker push "${IMAGE}:${{ inputs.version }}"
          docker push "${IMAGE}:${{ github.sha }}"

  release-notes:
    needs: images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Write release summary
        run: |
          {
            echo "## SwarmCast ${{ inputs.version }}"
            echo "- Environment: ${{ inputs.environment }}"
            echo "- Images: auth, ingest, tracker, control-plane, retention-worker, nginx, prometheus, alertmanager, grafana, edge-nginx, edge-metrics, node-exporter"
            echo "- Immutable tags: ${{ inputs.version }}, ${{ github.sha }}"
            echo "- Release manifest artifact: swarmcast-release-manifest"
            echo "- SBOM artifact: swarmcast-sbom"
            echo "- Readiness gate: docs/launch-readiness.md"
          } >> "$GITHUB_STEP_SUMMARY"
