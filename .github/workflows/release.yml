name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Immutable release version, for example v0.1.0-rc1
        required: true
        type: string
      environment:
        description: Deployment environment
        required: true
        default: staging
        type: choice
        options:
          - staging
          - production

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: npm
      - name: Validate release input
        env:
          RELEASE_VERSION: ${{ inputs.version }}
        run: |
          [[ "$RELEASE_VERSION" =~ ^v?[0-9A-Za-z][0-9A-Za-z._-]*$ ]]
      - run: npm ci --ignore-scripts
      - run: npm run verify
      - run: npm audit --audit-level=moderate
      - run: npm run sbom:generate -- --check

  images:
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      packages: write
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: auth
            mode: build
            dockerfile: services/auth/Dockerfile
            env_name: SWARMCAST_AUTH_IMAGE
          - service: ingest
            mode: build
            dockerfile: services/ingest/Dockerfile
            env_name: SWARMCAST_INGEST_IMAGE
          - service: tracker
            mode: build
            dockerfile: services/tracker/Dockerfile
            env_name: SWARMCAST_TRACKER_IMAGE
          - service: control-plane
            mode: build
            dockerfile: services/control-plane/Dockerfile
            env_name: SWARMCAST_CONTROL_PLANE_IMAGE
          - service: retention-worker
            mode: build
            dockerfile: services/retention-worker/Dockerfile
            env_name: SWARMCAST_RETENTION_WORKER_IMAGE
          - service: nginx
            mode: build
            dockerfile: infra/nginx/Dockerfile
            env_name: SWARMCAST_NGINX_IMAGE
          - service: edge-nginx
            mode: build
            dockerfile: infra/edge/Dockerfile.nginx
            env_name: SWARMCAST_EDGE_NGINX_IMAGE
          - service: edge-metrics
            mode: build
            dockerfile: infra/edge/Dockerfile.metrics
            env_name: SWARMCAST_EDGE_METRICS_IMAGE
          - service: prometheus
            mode: mirror
            source: prom/prometheus:v3.13.1-distroless@sha256:214f8427c8fba80c327bb94a75feb802ae12f2d6ca30812aa6e7d22f09bbea80
            env_name: SWARMCAST_PROMETHEUS_IMAGE
          - service: alertmanager
            mode: build
            dockerfile: infra/monitoring/Dockerfile.alertmanager
            env_name: SWARMCAST_ALERTMANAGER_IMAGE
          - service: grafana
            mode: build
            dockerfile: infra/monitoring/Dockerfile.grafana
            env_name: SWARMCAST_GRAFANA_IMAGE
          - service: node-exporter
            mode: mirror
            source: prom/node-exporter:v1.12.0-distroless@sha256:843ed23bb564f897ddcc6b6b9b605e398779487a561aae36fddd2933394836cd
            env_name: SWARMCAST_NODE_EXPORTER_IMAGE
          - service: turn
            mode: build
            dockerfile: infra/turn/Dockerfile
            env_name: SWARMCAST_TURN_IMAGE
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: aquasecurity/setup-trivy@81e514348e19b6112ce2a7e3ecbafe19c1e1f567 # v0.3.1
        with:
          version: v0.72.0
          cache: true
      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          cosign-release: v3.1.1
      - name: Build or mirror immutable image
        id: image
        env:
          RELEASE_VERSION: ${{ inputs.version }}
          SERVICE: ${{ matrix.service }}
          MODE: ${{ matrix.mode }}
          DOCKERFILE: ${{ matrix.dockerfile }}
          SOURCE_IMAGE: ${{ matrix.source }}
          IMAGE_ENV_NAME: ${{ matrix.env_name }}
        run: |
          set -euo pipefail
          IMAGE="ghcr.io/${GITHUB_REPOSITORY,,}/${SERVICE}"
          if [[ "$MODE" == "build" ]]; then
            docker build --pull -f "$DOCKERFILE" -t "$IMAGE:$RELEASE_VERSION" -t "$IMAGE:$GITHUB_SHA" .
          else
            docker pull "$SOURCE_IMAGE"
            docker tag "$SOURCE_IMAGE" "$IMAGE:$RELEASE_VERSION"
            docker tag "$SOURCE_IMAGE" "$IMAGE:$GITHUB_SHA"
          fi
          docker push "$IMAGE:$RELEASE_VERSION"
          docker push "$IMAGE:$GITHUB_SHA"
          docker image rm "$IMAGE:$RELEASE_VERSION" "$IMAGE:$GITHUB_SHA" >/dev/null
          docker pull "$IMAGE:$RELEASE_VERSION"
          IMAGE_REF=$(docker image inspect --format '{{ json .RepoDigests }}' "$IMAGE:$RELEASE_VERSION" | node scripts/select-owned-image-ref.js "$IMAGE")
          [[ "$IMAGE_REF" =~ ^${IMAGE}@sha256:[a-f0-9]{64}$ ]]
          mkdir -p var/image-evidence var/scans var/image-sboms
          printf '%s=%s\n' "$IMAGE_ENV_NAME" "$IMAGE_REF" > "var/image-evidence/$SERVICE.env"
          printf '%s\n' "$IMAGE_REF" > "var/image-evidence/$SERVICE.digest"
          echo "image_ref=$IMAGE_REF" >> "$GITHUB_OUTPUT"
      - name: Generate real image scan and SBOM
        env:
          SERVICE: ${{ matrix.service }}
          IMAGE_REF: ${{ steps.image.outputs.image_ref }}
        run: |
          trivy image --format json --output "var/scans/$SERVICE.trivy.json" "$IMAGE_REF"
          trivy image --scanners vuln --format cyclonedx --output "var/image-sboms/$SERVICE.cdx.json" "$IMAGE_REF"
      - name: Enforce HIGH and CRITICAL vulnerability gate
        env:
          SERVICE: ${{ matrix.service }}
        run: node scripts/validate-image-scan-report.js "var/scans/$SERVICE.trivy.json"
      - name: Sign and verify image digest
        env:
          SERVICE: ${{ matrix.service }}
          IMAGE_REF: ${{ steps.image.outputs.image_ref }}
        run: |
          cosign sign --yes "$IMAGE_REF"
          cosign verify \
            --certificate-identity-regexp "^https://github.com/${GITHUB_REPOSITORY}/.github/workflows/release.yml@refs/heads/.*$" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            "$IMAGE_REF" > "var/image-evidence/$SERVICE.cosign-verify.json"
      - name: Upload per-image release evidence
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: swarmcast-image-${{ matrix.service }}
          path: |
            var/image-evidence/${{ matrix.service }}.*
            var/scans/${{ matrix.service }}.trivy.json
            var/image-sboms/${{ matrix.service }}.cdx.json
          if-no-files-found: error
          retention-days: 90

  release-evidence:
    needs: images
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: npm
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: swarmcast-image-*
          path: var
          merge-multiple: true
      - run: npm ci --ignore-scripts
      - name: Validate digests and assemble release evidence
        env:
          RELEASE_VERSION: ${{ inputs.version }}
          RELEASE_ENVIRONMENT: ${{ inputs.environment }}
        run: |
          set -euo pipefail
          set -a
          # The release image env files are generated by the matrix jobs.
          # shellcheck disable=SC1090
          for file in var/image-evidence/*.env; do . "$file"; done
          set +a
          npm run release:images:check
          mkdir -p var/release var/sbom
          npm run release:manifest -- \
            --version "$RELEASE_VERSION" \
            --environment "$RELEASE_ENVIRONMENT" \
            --commit "$GITHUB_SHA" \
            --repository "$GITHUB_REPOSITORY" \
            --require-digests \
            --output var/release/swarmcast-release-manifest.json
          npm run release:manifest -- --input var/release/swarmcast-release-manifest.json --check
          npm run sbom:generate -- --output var/sbom/swarmcast-sbom.json
          npm run sbom:generate -- --check
          npm run image:scan:bundle:validate -- \
            --manifest var/release/swarmcast-release-manifest.json \
            var/scans/*.trivy.json
      - name: Upload release manifest
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: swarmcast-release-manifest
          path: var/release/swarmcast-release-manifest.json
          if-no-files-found: error
          retention-days: 90
      - name: Upload source SBOM
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: swarmcast-sbom
          path: var/sbom/swarmcast-sbom.json
          if-no-files-found: error
          retention-days: 90
      - name: Upload image scans
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: swarmcast-image-scans
          path: var/scans/*.trivy.json
          if-no-files-found: error
          retention-days: 90
      - name: Upload image SBOMs and signatures
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: swarmcast-image-sboms-signatures
          path: |
            var/image-sboms/*.cdx.json
            var/image-evidence/*.cosign-verify.json
            var/image-evidence/*.digest
          if-no-files-found: error
          retention-days: 90

  release-notes:
    needs: release-evidence
    runs-on: ubuntu-latest
    steps:
      - name: Write release summary
        env:
          RELEASE_VERSION: ${{ inputs.version }}
          RELEASE_ENVIRONMENT: ${{ inputs.environment }}
        run: |
          {
            echo "## SwarmCast $RELEASE_VERSION"
            echo "- Environment: $RELEASE_ENVIRONMENT"
            echo "- Images: 12 digest-pinned GHCR images"
            echo "- Signatures: keyless Cosign signatures verified for every digest"
            echo "- Scans: 12 real Trivy JSON reports with no blocked findings"
            echo "- SBOMs: source SBOM plus 12 CycloneDX image SBOMs"
            echo "- Release manifest artifact: swarmcast-release-manifest"
            echo "- SBOM artifact: swarmcast-sbom"
            echo "- Commit: $GITHUB_SHA"
            echo "- Readiness gate: docs/launch-readiness.md"
          } >> "$GITHUB_STEP_SUMMARY"
