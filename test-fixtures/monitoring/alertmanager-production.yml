global:
  resolve_timeout: 5m

route:
  receiver: oncall-default
  group_by: ["alertname", "severity"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  routes:
    - matchers:
        - severity="critical"
      receiver: oncall-critical
      repeat_interval: 30m

receivers:
  - name: oncall-default
    webhook_configs:
      - url: https://alerts.swarmcast.tv/webhooks/default
        send_resolved: true

  - name: oncall-critical
    webhook_configs:
      - url: https://alerts.swarmcast.tv/webhooks/critical
        send_resolved: true
